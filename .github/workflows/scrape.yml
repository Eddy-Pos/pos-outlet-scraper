name: Scrape POS Outlets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      outlet_count: ${{ steps.scraper.outputs.count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run scraper
        id: scraper
        run: |
          python scrape_pos_outlets.py | tee /tmp/scraper_out.txt
          count=$(sed -n 's/.* \([0-9]*\) outlets.*/\1/p' /tmp/scraper_out.txt | tail -1 || echo "0")
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Commit and push data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase || true
          git push

      - name: Send Teams Alert - Success
        if: success()
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          COUNT: ${{ steps.scraper.outputs.count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"✅ POS Scraper: ${COUNT} outlets fetched | [View Run](${RUN_URL})\"
          }" $WEBHOOK

      - name: Send Teams Alert - Failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"❌ POS Scraper: Failed | [View Logs](${RUN_URL})\"
          }" $WEBHOOK
