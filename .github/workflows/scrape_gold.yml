name: Scrape Gold Price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUTF8: 1

jobs:
  scrape:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: python -m pip install requests websockets 2>&1

      - name: Capture live gold price
        id: capture
        shell: powershell
        run: |
          $outfile = "$env:RUNNER_TEMP\capture_out.txt"
          python capture_live_price.py 2>&1 | ForEach-Object { "$_" } | Tee-Object -FilePath $outfile
          $rc = $LASTEXITCODE

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Script Output (exit code: $rc)"
          Get-Content $outfile | Add-Content -Path $env:GITHUB_STEP_SUMMARY

          Add-Content -Path $env:GITHUB_OUTPUT -Value "exit_code=$rc"
          $errorLine = Select-String -Path $outfile -Pattern "(ERROR|SCRIPT|SERVER).*" | Select-Object -Last 1
          if ($errorLine) {
            $clean = $errorLine.Line -replace '[^a-zA-Z0-9 _.:-]', ''
            Add-Content -Path $env:GITHUB_OUTPUT -Value "error_msg=$clean"
          }
          if ($rc -eq 2) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "error_type=server"
          } elseif ($rc -eq 1) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "error_type=script"
          }

          if ($rc -ne 0) { exit $rc }

          $price = Select-String -Path $outfile -Pattern "Buy RM ([\d.]+)" | ForEach-Object { $_.Matches.Groups[1].Value } | Select-Object -Last 1
          Add-Content -Path $env:GITHUB_OUTPUT -Value "price=$price"

      - name: Commit and push data
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          $token = $env:GITHUB_TOKEN
          git remote set-url origin "https://x-access-token:${token}@github.com/${{ github.repository }}"
          git add -A
          $dirty = git diff --quiet 2>$null; $staged = git diff --staged --quiet 2>$null
          if (-not ($dirty -and $staged)) {
            $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm UTC')
            git commit -m "Gold price update: RM ${{ steps.capture.outputs.price }}/g ($date)"
            git pull --rebase 2>$null
            git push
          }

      - name: Teams Alert — Success
        if: success()
        shell: powershell
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          PRICE: ${{ steps.capture.outputs.price }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $body = @{ text = "🟡 Gold Price: RM $env:PRICE/g | [View Run]($env:RUN_URL)" } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:WEBHOOK -Method Post -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

      - name: Teams Alert — Server Down
        if: failure() && steps.capture.outputs.error_type == 'server'
        shell: powershell
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $body = @{ text = "🔴 Server Unreachable — Gold price server is down or timing out | [View Logs]($env:RUN_URL)" } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:WEBHOOK -Method Post -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

      - name: Teams Alert — Script Error
        if: failure() && steps.capture.outputs.error_type == 'script'
        shell: powershell
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $body = @{ text = "🔴 Script Error — Gold scraper hit an unexpected error | [View Logs]($env:RUN_URL)" } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:WEBHOOK -Method Post -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
