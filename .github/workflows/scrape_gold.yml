name: Scrape Gold Price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests websockets

      - name: Diagnostic - check connectivity
        shell: bash
        run: |
          set -e
          echo "## Python" >> $GITHUB_STEP_SUMMARY
          python --version >> $GITHUB_STEP_SUMMARY 2>&1
          echo "## HTTP test (timeout 10s)" >> $GITHUB_STEP_SUMMARY
          curl -sk --connect-timeout 10 -o /dev/null -w "HTTP %{http_code}\n" https://posarrahnugold.ace2u.com/index-landing.php >> $GITHUB_STEP_SUMMARY 2>&1 || echo "CURL FAILED" >> $GITHUB_STEP_SUMMARY
          echo "## DNS test" >> $GITHUB_STEP_SUMMARY
          host posarrahnugoldprodapi.ace2u.com >> $GITHUB_STEP_SUMMARY 2>&1 || echo "DNS FAILED" >> $GITHUB_STEP_SUMMARY
          echo "## Quick port test" >> $GITHUB_STEP_SUMMARY
          timeout 5 bash -c 'echo > /dev/tcp/posarrahnugoldprodapi.ace2u.com/443 && echo "PORT 443 OPEN"' 2>&1 >> $GITHUB_STEP_SUMMARY || echo "PORT 443 CLOSED" >> $GITHUB_STEP_SUMMARY
          echo "## Public IP" >> $GITHUB_STEP_SUMMARY
          curl -s --connect-timeout 5 https://httpbin.org/ip >> $GITHUB_STEP_SUMMARY 2>&1 || echo "IP CHECK FAILED" >> $GITHUB_STEP_SUMMARY

      - name: Capture live gold price
        id: capture
        shell: bash
        run: |
          set +e
          python capture_live_price.py 2>&1 | tee /tmp/capture_out.txt
          rc=$?
          set -e
          echo "### Script Output (exit code: $rc)" >> $GITHUB_STEP_SUMMARY
          cat /tmp/capture_out.txt >> $GITHUB_STEP_SUMMARY
          if [ $rc -ne 0 ]; then
            echo "### Python script exited with code $rc" >> $GITHUB_STEP_SUMMARY
            exit $rc
          fi
          price=$(grep -oP 'Buy RM \K[\d.]+' /tmp/capture_out.txt | tail -1)
          if [ -z "$price" ]; then
            echo "### ERROR: No price found in output" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "price=$price" >> $GITHUB_OUTPUT

      - name: Commit and push data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Gold price update: RM ${{ steps.capture.outputs.price }}/g ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git pull --rebase || true
          git push

      - name: Send Teams Alert - Success
        if: success()
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          PRICE: ${{ steps.capture.outputs.price }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"🟡 Gold Price: RM ${PRICE}/g | [View Run](${RUN_URL})\"
          }" $WEBHOOK

      - name: Send Teams Alert - Failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"🔴 Gold Scraper Failed | [View Logs](${RUN_URL})\"
          }" $WEBHOOK
