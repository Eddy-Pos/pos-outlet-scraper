name: Scrape Gold Price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUTF8: 1

jobs:
  scrape:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        shell: bash
        run: pip install requests websockets

      - name: Capture live gold price
        id: capture
        shell: bash
        run: |
          outfile="$RUNNER_TEMP/capture_out.txt"
          set +e
          python capture_live_price.py 2>&1 | tee "$outfile"
          rc=${PIPESTATUS[0]}
          set -e

          echo "### Script Output (exit code: $rc)" >> $GITHUB_STEP_SUMMARY
          cat "$outfile" >> $GITHUB_STEP_SUMMARY

          echo "exit_code=$rc" >> $GITHUB_OUTPUT
          grep -oP '(ERROR|SCRIPT|SERVER).*' "$outfile" | tail -1 | while read line; do
            echo "error_msg=$(echo "$line" | sed 's/[^a-zA-Z0-9 _.:-]//g')" >> $GITHUB_OUTPUT
          done
          if [ $rc -eq 2 ]; then
            echo "error_type=server" >> $GITHUB_OUTPUT
          elif [ $rc -eq 1 ]; then
            echo "error_type=script" >> $GITHUB_OUTPUT
          fi

          if [ $rc -ne 0 ]; then
            exit $rc
          fi

          price=$(grep -oP 'Buy RM \K[\d.]+' "$outfile" | tail -1)
          echo "price=$price" >> $GITHUB_OUTPUT

      - name: Commit and push data
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Gold price update: RM ${{ steps.capture.outputs.price }}/g ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git pull --rebase || true
          git push

      - name: Teams Alert — Success
        if: success()
        shell: bash
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          PRICE: ${{ steps.capture.outputs.price }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"🟡 Gold Price: RM ${PRICE}/g | [View Run](${RUN_URL})\"
          }" $WEBHOOK

      - name: Teams Alert — Server Down
        if: failure() && steps.capture.outputs.error_type == 'server'
        shell: bash
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"🔴 Server Unreachable — Gold price server is down or timing out | [View Logs](${RUN_URL})\"
          }" $WEBHOOK

      - name: Teams Alert — Script Error
        if: failure() && steps.capture.outputs.error_type == 'script'
        shell: bash
        env:
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"🔴 Script Error — Gold scraper hit an unexpected error | [View Logs](${RUN_URL})\"
          }" $WEBHOOK
